name: Coleta de notícias e cotações

# Plano Hobby da Vercel limita cron a 1x/dia, então a frequência real vem daqui.
# As funções aceitam GET (ver api/functions/[name].js), então basta um curl.
#
# Custo: cada chamada de collectLatestNews gera até AUTO_PROCESS_LIMIT artigos
# via DeepSeek (padrão 3). A cada 30min = ~144 artigos/dia. Ajuste a env
# AUTO_PROCESS_LIMIT no projeto da Vercel para controlar o custo.
#
# Observações do GitHub Actions:
# - schedules podem atrasar alguns minutos em horários de pico.
# - o agendamento é desativado após 60 dias sem atividade no repositório.

on:
  schedule:
    - cron: '*/30 * * * *' # a cada 30 minutos (UTC)
  workflow_dispatch: {}     # permite disparo manual pela aba Actions

# Evita execuções sobrepostas se uma demorar.
concurrency:
  group: collect-news
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      # Sobrescreva criando a variável de repositório SITE_URL (Settings →
      # Secrets and variables → Actions → Variables) se o domínio mudar.
      SITE_URL: ${{ vars.SITE_URL || 'https://quantjournal-omega.vercel.app' }}
    steps:
      - name: Coletar últimas notícias
        run: |
          curl --fail --show-error --silent --location \
            --retry 2 --max-time 60 \
            "$SITE_URL/api/functions/collectLatestNews" | head -c 2000
          echo

      - name: Atualizar cotações de mercado
        run: |
          curl --fail --show-error --silent --location \
            --retry 2 --max-time 60 \
            "$SITE_URL/api/functions/updateMarketSnapshots" | head -c 2000
          echo
