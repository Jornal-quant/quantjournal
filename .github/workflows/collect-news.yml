name: Coleta de notícias e cotações

# Plano Hobby da Vercel limita cron a 1x/dia e funções a 60s, então a frequência
# real e o processamento vêm daqui. As funções aceitam GET/POST (ver
# api/functions/[name].js).
#
# Estratégia (evita o timeout de 60s):
#   1. collectLatestNews com auto_process=false  -> só coleta os feeds (rápido).
#   2. processRawNews chamado N vezes             -> gera 1 artigo por chamada,
#      cada uma no seu próprio orçamento de 60s.
#   3. updateMarketSnapshots                      -> atualiza cotações (sem IA).
#
# Ajuste PROCESS_BATCH para gerar mais/menos artigos por execução (cada um
# consome créditos do DeepSeek).
#
# Observações do GitHub Actions:
# - schedules podem atrasar alguns minutos em horários de pico.
# - o agendamento é desativado após 60 dias sem atividade no repositório.

on:
  schedule:
    - cron: '*/30 * * * *' # a cada 30 minutos (UTC)
  workflow_dispatch: {}     # permite disparo manual pela aba Actions

concurrency:
  group: collect-news
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    env:
      # Sobrescreva criando a variável de repositório SITE_URL (Settings →
      # Secrets and variables → Actions → Variables) se o domínio mudar.
      SITE_URL: ${{ vars.SITE_URL || 'https://quantjournal-omega.vercel.app' }}
      PROCESS_BATCH: '4' # quantos artigos gerar por execução
      # Token de admin (igual ao ADMIN_TOKEN da Vercel). Crie como secret do repo:
      # Settings → Secrets and variables → Actions → New repository secret.
      ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
    steps:
      - name: Coletar feeds (sem IA)
        run: |
          curl --fail --show-error --silent --location \
            --retry 2 --max-time 70 \
            -X POST -H 'Content-Type: application/json' -H "x-admin-token: $ADMIN_TOKEN" \
            -d '{"auto_process":false}' \
            "$SITE_URL/api/functions/collectLatestNews" | head -c 2000
          echo

      - name: Gerar artigos da fila (1 por chamada)
        run: |
          for i in $(seq 1 "$PROCESS_BATCH"); do
            echo "--- processRawNews $i/$PROCESS_BATCH ---"
            # Não falha o job se uma geração específica der erro/timeout;
            # a fila continua e a próxima execução pega o resto.
            curl --show-error --silent --location \
              --max-time 80 \
              -X POST -H 'Content-Type: application/json' -H "x-admin-token: $ADMIN_TOKEN" -d '{}' \
              "$SITE_URL/api/functions/processRawNews" | head -c 1000 || true
            echo
            sleep 2
          done

      - name: Atualizar cotações de mercado
        run: |
          curl --fail --show-error --silent --location \
            --retry 2 --max-time 70 \
            -X POST -H 'Content-Type: application/json' -H "x-admin-token: $ADMIN_TOKEN" -d '{}' \
            "$SITE_URL/api/functions/updateMarketSnapshots" | head -c 2000
          echo
